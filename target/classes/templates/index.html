<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>E-commerce - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}" class="logo">E-commerce</a>
            <a th:href="@{/products}">Products</a>
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{/cart}">Cart</a>
                <a th:href="@{/orders/my-orders}">My Orders</a>
                <a th:href="@{/profile}">Profile</a>
                <span class="user" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit">Logout</button>
                </form>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Login</a>
            </span>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h1>Welcome to E-commerce</h1>
            <p>Browse our products and find what you need.</p>
            <a th:href="@{/products}" class="btn">View products</a>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 E-commerce Platform</p>
    </footer>
</body>
</html>
