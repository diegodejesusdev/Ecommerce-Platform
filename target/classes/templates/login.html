<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - E-commerce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}" class="logo">E-commerce</a>
            <a th:href="@{/products}">Products</a>
            <a th:href="@{/login}">Login</a>
        </nav>
    </header>
    <main>
        <section class="login-section">
            <h1>Login</h1>
            <p th:if="${param.error}" class="error">Invalid email or password.</p>
            <p th:if="${param.logout}" class="message">You have been logged out.</p>

            <form th:action="@{/login}" method="post" class="login-form">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" required autofocus/>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required/>

                <button type="submit">Sign in</button>
            </form>

            <p class="hint">Demo: admin@example.com / admin123</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 E-commerce Platform</p>
    </footer>
</body>
</html>
