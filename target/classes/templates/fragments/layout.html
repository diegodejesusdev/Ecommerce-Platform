<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' - E-commerce' : 'E-commerce'}">E-commerce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}" class="logo">E-commerce</a>
            <a th:href="@{/products}">Products</a>
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{/cart}">Cart</a>
                <span class="user" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit">Logout</button>
                </form>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Login</a>
            </span>
        </nav>
    </header>
    <main>
        <div th:replace="~{::content}">Page content</div>
    </main>
    <footer>
        <p>&copy; 2025 E-commerce Platform</p>
    </footer>
</body>
</html>
