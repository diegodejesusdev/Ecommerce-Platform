<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cart - E-commerce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}" class="logo">E-commerce</a>
            <a th:href="@{/products}">Products</a>
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{/cart}">Cart</a>
                <a th:href="@{/orders/my-orders}">My Orders</a>
                <a th:href="@{/profile}">Profile</a>
                <span class="user" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit">Logout</button>
                </form>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Login</a>
            </span>
        </nav>
    </header>
    <main>
        <h1>Your Cart</h1>

        <div th:if="${successMessage}" class="alert alert-success">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger">
            <p th:text="${errorMessage}"></p>
        </div>
        
        <div th:if="${cart == null or cart.items.isEmpty()}">
            <p>Your cart is empty.</p>
            <a th:href="@{/products}" class="btn">Continue shopping</a>
        </div>

        <div th:if="${cart != null and !cart.items.isEmpty()}">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cart.items}">
                        <td th:text="${item.product.name}">Product Name</td>
                        <td th:text="${'$' + item.product.price}">$0.00</td>
                        <td>
                            <form th:action="@{/cart/update}" method="post" class="inline">
                                <input type="hidden" name="itemId" th:value="${item.id}"/>
                                <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="qty-input"/>
                                <button type="submit" class="btn-sm">Update</button>
                            </form>
                        </td>
                        <td th:text="${'$' + (item.product.price * item.quantity)}">$0.00</td>
                        <td>
                            <form th:action="@{/cart/remove}" method="post">
                                <input type="hidden" name="itemId" th:value="${item.id}"/>
                                <button type="submit" class="btn-danger">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div class="cart-summary">
                <p>Total items: <span th:text="${#lists.size(cart.items)}">0</span></p>
                <!-- Calculate grand total in Thymeleaf if no total method in Cart -->
                <p class="grand-total">Grand Total: <span th:text="${'$' + #aggregates.sum(cart.items.![product.price * quantity])}">$0.00</span></p>
                <div class="cart-actions">
                    <a th:href="@{/products}" class="btn-secondary">Continue shopping</a>
                    <a th:href="@{/checkout}" class="btn">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 E-commerce Platform</p>
    </footer>
</body>
</html>
