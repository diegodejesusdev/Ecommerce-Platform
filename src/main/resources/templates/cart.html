<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cart - E-commerce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}" class="logo">E-commerce</a>
            <a th:href="@{/products}">Products</a>
            <a th:href="@{/cart}">Cart</a>
            <span class="user" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </header>
    <main>
        <h1>Your cart</h1>
        <p>Cart functionality will be implemented in the next step. For now you can browse products and log in.</p>
        <a th:href="@{/products}" class="btn">Continue shopping</a>
    </main>
    <footer>
        <p>&copy; 2025 E-commerce Platform</p>
    </footer>
</body>
</html>
