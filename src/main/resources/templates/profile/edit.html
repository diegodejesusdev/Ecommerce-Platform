<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Profile - E-commerce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}" class="logo">E-commerce</a>
            <a th:href="@{/products}">Products</a>
            <a th:href="@{/cart}">Cart</a>
            <a th:href="@{/orders/my-orders}">My Orders</a>
            <span class="user" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </header>
    <main>
        <h1>Edit Profile</h1>

        <div th:if="${successMessage}" class="alert alert-success">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger">
            <p th:text="${errorMessage}"></p>
        </div>

        <div class="profile-edit-container">
            <div class="edit-section">
                <h2>Update Profile Information</h2>
                <form th:action="@{/profile/update}" method="post" th:object="${user}">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" required/>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}" required/>
                    </div>
                    <div class="form-actions">
                        <a th:href="@{/profile}" class="btn-secondary">Cancel</a>
                        <button type="submit" class="btn">Save Changes</button>
                    </div>
                </form>
            </div>

            <div class="edit-section">
                <h2>Change Password</h2>
                <form th:action="@{/profile/change-password}" method="post">
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" name="currentPassword" required/>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" required minlength="6"/>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"/>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn">Change Password</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 E-commerce Platform</p>
    </footer>
</body>
</html>
