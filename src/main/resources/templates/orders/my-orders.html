<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Orders - E-commerce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}" class="logo">E-commerce</a>
            <a th:href="@{/products}">Products</a>
            <a th:href="@{/cart}">Cart</a>
            <a th:href="@{/orders/my-orders}">My Orders</a>
            <span class="user" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </header>
    <main>
        <h1>My Orders</h1>

        <div th:if="${ordersPage == null or ordersPage.isEmpty()}">
            <p>You haven't placed any orders yet.</p>
            <a th:href="@{/products}" class="btn">Browse Products</a>
        </div>

        <div th:if="${ordersPage != null and !ordersPage.isEmpty()}">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Order Number</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${ordersPage.content}">
                        <td th:text="${order.orderNumber}">ORD-XXXX</td>
                        <td th:text="${'$' + order.total}">$0.00</td>
                        <td>
                            <span th:class="'status-badge status-' + ${#strings.toLowerCase(order.status)}"
                                  th:text="${order.status}">PENDING</span>
                        </td>
                        <td th:text="${order.createdAt}">2025-01-01</td>
                        <td>
                            <a th:href="@{/orders/{id}/user(id=${order.id})}" class="btn-sm">View</a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination" th:if="${ordersPage.totalPages > 1}">
                <a th:if="${ordersPage.hasPrevious()}"
                   th:href="@{/orders/my-orders(page=${ordersPage.number - 1})}"
                   class="btn-secondary">&laquo; Previous</a>
                <span th:if="${!ordersPage.hasPrevious()}" class="btn-secondary disabled">&laquo; Previous</span>

                <span class="page-info">
                    Page <span th:text="${ordersPage.number + 1}">1</span> of <span th:text="${ordersPage.totalPages}">1</span>
                </span>

                <a th:if="${ordersPage.hasNext()}"
                   th:href="@{/orders/my-orders(page=${ordersPage.number + 1})}"
                   class="btn-secondary">Next &raquo;</a>
                <span th:if="${!ordersPage.hasNext()}" class="btn-secondary disabled">Next &raquo;</span>
            </div>
        </div>

        <div class="pagination-actions">
            <a th:href="@{/}" class="btn-secondary">Back to Home</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 E-commerce Platform</p>
    </footer>
</body>
</html>
